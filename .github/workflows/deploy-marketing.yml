name: Deploy site (marketing + demo app)

on:
  push:
    branches: [main]
    paths:
      - marketing/**
      - app/**
      - data/**
      - .github/workflows/deploy-marketing.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install app deps
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build NY Trip demo
        working-directory: app
        env:
          MERIDIAN_DATA: data/ny-trip
        run: bun run build -- --base /Meridian/NY-Trip/ --outDir dist-ny

      - name: Build Love Story demo
        working-directory: app
        env:
          MERIDIAN_DATA: data/love-story
        run: bun run build -- --base /Meridian/Love-Story/ --outDir dist-love

      - name: Compose site (marketing at /, two demos under /NY-Trip/ and /Love-Story/)
        run: |
          mkdir -p _site
          cp -r marketing/. _site/
          cp -r app/dist-ny _site/NY-Trip
          cp -r app/dist-love _site/Love-Story

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v4
