services:
  meridian:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: meridian:latest
    container_name: meridian
    restart: unless-stopped
    ports:
      - "6988:80"
    volumes:
      - ../data/ny-trip/photos:/usr/share/nginx/html/photos:ro
      - ../data/ny-trip/music:/usr/share/nginx/html/music:ro
      - ../data/ny-trip/videos:/usr/share/nginx/html/videos:ro
