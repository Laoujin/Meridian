server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed bundle: cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Media: cache aggressively, allow range requests for video
    location ~* \.(jpg|jpeg|png|gif|webp|svg|mp4|mov|webm|mp3|m4a|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Large uploads / range requests for video
    client_max_body_size 0;
    sendfile on;
    tcp_nopush on;
}
